<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Management - Live Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700;800&display=swap');
        body { font-family: 'Assistant', sans-serif; background-color: #020617; color: #f8fafc; }
        .card-grad { background: linear-gradient(145deg, rgba(30, 41, 59, 0.4) 0%, rgba(15, 23, 42, 0.6) 100%); backdrop-filter: blur(10px); }
        .profit-text { color: #10b981; }
        .loss-text { color: #f43f5e; }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        
        <div class="mb-10 grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-slate-900/60 p-6 rounded-3xl border border-slate-800 shadow-2xl">
                <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest mb-1">שווי תיק כולל</p>
                <div id="total-value" class="text-4xl font-black text-white tracking-tighter font-mono">₪ 0</div>
            </div>
            
            <div class="bg-slate-900/60 p-6 rounded-3xl border border-slate-800 shadow-2xl">
                <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest mb-1">רווח/הפסד כולל (₪)</p>
                <div id="total-pnl" class="text-3xl font-black tracking-tighter font-mono">₪ 0</div>
                <div id="total-pnl-percent" class="text-sm font-bold mt-1 opacity-90 tracking-wide">0.00%</div>
            </div>

            <div class="flex items-center justify-between bg-slate-900/60 p-6 rounded-3xl border border-slate-800 shadow-2xl">
                <div>
                    <div class="flex items-center gap-2">
                        <div id="led" class="w-3 h-3 bg-amber-500 rounded-full pulse"></div>
                        <span id="status" class="text-xs font-mono font-bold text-amber-400 uppercase tracking-widest">טוען...</span>
                    </div>
                    <p id="last-update" class="text-[9px] text-slate-500 mt-2 italic tracking-wider"></p>
                </div>
                <button onclick="fetchData()" class="bg-blue-600 hover:bg-blue-500 text-white px-5 py-2.5 rounded-xl text-xs font-bold transition-all shadow-lg active:scale-95 shadow-blue-900/20">רענון</button>
            </div>
        </div>

        <div id="dashboard" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 gap-8">
            <div class="col-span-full text-center py-24 text-slate-600 italic text-xl">מתחבר למסד הנתונים...</div>
        </div>

        <footer class="mt-20 pt-10 border-t border-slate-900 flex justify-between items-center text-[10px] text-slate-600 font-mono">
            <div>SOURCE: GOOGLE SHEETS API (CSV)</div>
            <div>P&L = (CUR_PRICE - BUY_PRICE) * QTY / 100</div>
        </footer>
    </div>

    <script>
        // הלינק שלך (כפי שהגדרת קודם)
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRLE8jDhlsiNvpe6jZLmpVssN32mzA2D7UIGwjjnsTbjdpHPBUFVwloOWNRbAZSpM0b_p-AiNvJNoer/pub?gid=0&single=true&output=csv';

        function fetchData() {
            document.getElementById('status').innerText = 'מסתנכרן...';
            document.getElementById('led').className = 'w-3 h-3 bg-amber-500 rounded-full pulse';

            Papa.parse(SHEET_URL, {
                download: true,
                header: true,
                skipEmptyLines: true,
                transformHeader: h => h.replace(/[^\w\s\u0590-\u05FF?%()]/gi, '').trim(),
                complete: function(results) {
                    if (results.data && results.data.length > 0) {
                        renderDashboard(results.data);
                        document.getElementById('status').innerText = 'LIVE';
                        document.getElementById('last-update').innerText = 'עדכון: ' + new Date().toLocaleTimeString('he-IL');
                        document.getElementById('led').className = 'w-3 h-3 bg-emerald-500 rounded-full';
                    }
                }
            });
        }

        function renderDashboard(data) {
            const container = document.getElementById('dashboard');
            container.innerHTML = '';
            
            let totalPortfolioValue = 0;
            let totalOriginalInvestment = 0;

            data.forEach(row => {
                const name = row['שם הקרן'] || Object.values(row)[0];
                if (!name || name.length < 2) return;

                // המרה למספרים
                const nav = parseFloat(row['NAV אחרון (ידני)']) || 0;
                const fairValue = parseFloat(row['מחיר תיאורטי מוערך']) || 0;
                const quantity = parseFloat(row['כמות יחידות']) || 0;
                const buyPrice = parseFloat(row['מחיר קנייה']) || 0;
                const protection = row['הגנת מט"ח?'] || row['הגנת מטח?'] || "שקלית";

                // חישובי שווי (חלקי 100 כי מחירי הקרנות באגורות)
                const currentHoldingsValue = (fairValue * quantity) / 100;
                const initialInvestmentValue = (buyPrice * quantity) / 100;
                
                totalPortfolioValue += currentHoldingsValue;
                totalOriginalInvestment += initialInvestmentValue;

                // רווח/הפסד מאז הקנייה
                const profitAmount = currentHoldingsValue - initialInvestmentValue;
                const profitPercent = buyPrice > 0 ? ((fairValue - buyPrice) / buyPrice) * 100 : 0;
                
                // שינוי יומי (לעומת ה-NAV האחרון)
                const dailyChange = nav > 0 ? ((fairValue - nav) / nav) * 100 : 0;
                const isDailyPos = dailyChange >= 0;
                const isTotalPos = profitAmount >= 0;

                const card = document.createElement('div');
                card.className = 'card-grad p-8 rounded-3xl border border-slate-800 shadow-2xl hover:border-blue-500/30 transition-all duration-500 group';
                
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-8">
                        <div>
                            <span class="text-[9px] font-mono text-slate-500 uppercase tracking-widest leading-none">#${row['מספר קרן']}</span>
                            <h2 class="text-xl font-black text-white group-hover:text-blue-300 transition-colors mt-1">${name}</h2>
                            <p class="text-cyan-400 text-xs font-bold mt-1 tracking-tight italic opacity-80">${row['מדד']}</p>
                        </div>
                        <div class="text-right">
                            <span class="bg-slate-900/80 px-2.5 py-1 rounded-md text-[8px] font-bold text-slate-400 border border-slate-800 uppercase tracking-widest">${protection}</span>
                            <p class="text-[10px] text-slate-500 mt-3 font-mono">QTY: ${quantity.toLocaleString()}</p>
                        </div>
                    </div>

                    <div class="flex justify-between items-end border-t border-slate-800/50 pt-6">
                        <div>
                            <p class="text-[9px] text-slate-500 font-bold uppercase mb-1 tracking-widest">שווי נוכחי</p>
                            <p class="text-2xl font-black text-slate-100 font-mono tracking-tighter">₪ ${currentHoldingsValue.toLocaleString('he-IL', {maximumFractionDigits: 0})}</p>
                            <p class="text-[10px] mt-1 font-bold ${isTotalPos ? 'profit-text' : 'loss-text'}">
                                ${isTotalPos ? '▲' : '▼'} ₪ ${Math.abs(profitAmount).toLocaleString('he-IL', {maximumFractionDigits: 0})} (${Math.abs(profitPercent).toFixed(2)}%)
                            </p>
                        </div>
                        <div class="text-right">
                            <p class="text-[9px] text-blue-400 font-bold uppercase mb-1 tracking-widest italic">Fair Value (אג')</p>
                            <div class="text-3xl font-black ${isDailyPos ? 'text-emerald-400' : 'text-rose-400'} tracking-tighter font-mono leading-none">
                                ${fairValue.toFixed(2)}
                            </div>
                            <div class="text-[10px] font-bold mt-2 ${isDailyPos ? 'text-emerald-500' : 'text-rose-500'} flex items-center justify-end gap-1">
                                <span>היום:</span>
                                <span>${isDailyPos ? '▲' : '▼'}</span>
                                <span>${Math.abs(dailyChange).toFixed(2)}%</span>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });

            // עדכון המדדים העליונים
            document.getElementById('total-value').innerText = `₪ ${totalPortfolioValue.toLocaleString('he-IL', {maximumFractionDigits: 0})}`;
            
            const totalPnL = totalPortfolioValue - totalOriginalInvestment;
            const totalPnLPercent = totalOriginalInvestment > 0 ? (totalPnL / totalOriginalInvestment) * 100 : 0;
            const pnlElement = document.getElementById('total-pnl');
            const pnlPercentElement = document.getElementById('total-pnl-percent');

            pnlElement.innerText = `₪ ${totalPnL.toLocaleString('he-IL', {maximumFractionDigits: 0})}`;
            pnlElement.className = `text-3xl font-black tracking-tighter font-mono ${totalPnL >= 0 ? 'profit-text' : 'loss-text'}`;
            
            pnlPercentElement.innerText = `${totalPnL >= 0 ? '▲' : '▼'} ${Math.abs(totalPnLPercent).toFixed(2)}% מההשקעה`;
            pnlPercentElement.className = `text-sm font-bold mt-1 tracking-wide ${totalPnL >= 0 ? 'profit-text' : 'loss-text'}`;
        }

        fetchData();
        setInterval(fetchData, 60000);
    </script>
</body>
</html>
