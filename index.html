<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מנהל תיק השקעות - Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700;800&display=swap');
        body { font-family: 'Assistant', sans-serif; background-color: #020617; color: #f8fafc; }
        .card-grad { background: linear-gradient(145deg, rgba(30, 41, 59, 0.4) 0%, rgba(15, 23, 42, 0.6) 100%); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .profit { color: #10b981; text-shadow: 0 0 10px rgba(16, 185, 129, 0.2); }
        .loss { color: #f43f5e; text-shadow: 0 0 10px rgba(244, 63, 94, 0.2); }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        
        <div class="mb-8 grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="card-grad p-6 rounded-3xl shadow-2xl">
                <p class="text-slate-500 text-xs font-bold uppercase mb-1 tracking-widest">שווי תיק כולל</p>
                <div id="total-value" class="text-4xl font-black text-white font-mono tracking-tighter leading-none">₪ 0</div>
            </div>
            
            <div class="card-grad p-6 rounded-3xl shadow-2xl">
                <p class="text-slate-500 text-xs font-bold uppercase mb-1 tracking-widest">רווח/הפסד מצטבר</p>
                <div id="total-pnl" class="text-3xl font-black font-mono tracking-tighter">₪ 0</div>
                <div id="total-pnl-percent" class="text-sm font-bold mt-1 opacity-80">0.00%</div>
            </div>

            <div class="flex items-center justify-between card-grad p-6 rounded-3xl shadow-2xl">
                <div>
                    <div class="flex items-center gap-2">
                        <div id="led" class="w-3 h-3 bg-amber-500 rounded-full pulse"></div>
                        <span id="status" class="text-xs font-mono font-bold text-amber-400 uppercase tracking-widest">Connecting</span>
                    </div>
                    <p id="update-time" class="text-[10px] text-slate-500 mt-2 font-mono italic"></p>
                </div>
                <button onclick="fetchData()" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2.5 rounded-xl text-xs font-black shadow-lg active:scale-95 transition-all">רענון</button>
            </div>
        </div>

        <div id="dashboard" class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="col-span-full text-center py-20 text-slate-600 animate-pulse italic">טוען נתונים מהגיליון...</div>
        </div>
    </div>

    <script>
        // וודא שזה הלינק מהגיליון החדש שפורסם כ-CSV
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRLE8jDhlsiNvpe6jZLmpVssN32mzA2D7UIGwjjnsTbjdpHPBUFVwloOWNRbAZSpM0b_p-AiNvJNoer/pub?gid=0&single=true&output=csv';

        function cleanNum(val) {
            if (!val || val === "") return 0;
            // מסיר פסיקים, רווחים וסימני שקל כדי להפוך למספר תקין
            const cleaned = val.toString().replace(/,/g, '').replace(/[₪%]/g, '').trim();
            return parseFloat(cleaned) || 0;
        }

        function fetchData() {
            document.getElementById('status').innerText = 'SYNCING';
            Papa.parse(SHEET_URL, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    if (results.data && results.data.length > 0) {
                        renderDashboard(results.data);
                        document.getElementById('status').innerText = 'LIVE';
                        document.getElementById('update-time').innerText = 'Updated: ' + new Date().toLocaleTimeString('he-IL');
                        document.getElementById('led').className = 'w-3 h-3 bg-emerald-500 rounded-full';
                    }
                }
            });
        }

        function renderDashboard(data) {
            const container = document.getElementById('dashboard');
            container.innerHTML = '';
            
            let totalValueSum = 0;
            let totalInvestmentSum = 0;

            data.forEach(row => {
                // זיהוי עמודות לפי מילות מפתח (חסין לשינויי שמות קלים)
                const find = (word) => {
                    const key = Object.keys(row).find(k => k.includes(word));
                    return row[key];
                };

                const name = find('שם') || Object.values(row)[0];
                if (!name || name.length < 2) return;

                const nav = cleanNum(find('NAV'));
                const fairValue = cleanNum(find('תיאורטי'));
                const quantity = cleanNum(find('כמות'));
                const buyPrice = cleanNum(find('קנייה'));

                // חישוב שווי (חלקי 100 כי מחירי הקרנות באגורות)
                const currentHoldValue = (fairValue * quantity) / 100;
                const costHoldValue = (buyPrice * quantity) / 100;
                
                totalValueSum += currentHoldValue;
                totalInvestmentSum += costHoldValue;

                const profitAmount = currentHoldValue - costHoldValue;
                const profitPercent = buyPrice > 0 ? ((fairValue - buyPrice) / buyPrice) * 100 : 0;
                const dailyChange = nav > 0 ? ((fairValue - nav) / nav) * 100 : 0;

                const card = document.createElement('div');
                card.className = 'card-grad p-8 rounded-3xl shadow-2xl hover:border-blue-500/30 transition-all duration-300';
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-6 border-b border-slate-800/50 pb-5">
                        <div>
                            <h2 class="text-xl font-black text-white leading-tight">${name}</h2>
                            <p class="text-cyan-400 text-xs font-bold mt-1 opacity-70 italic tracking-wide">${find('מדד') || ''}</p>
                        </div>
                        <div class="text-right">
                            <span class="text-[10px] text-blue-400 font-bold uppercase tracking-widest">שווי בשקלים</span>
                            <p class="text-3xl font-black text-white font-mono leading-none mt-1 tracking-tighter">₪ ${currentHoldValue.toLocaleString('he-IL', {maximumFractionDigits: 0})}</p>
                        </div>
                    </div>
                    <div class="flex justify-between items-end">
                        <div>
                            <p class="text-[9px] text-slate-500 font-bold uppercase mb-1 tracking-widest">רווח/הפסד מאז הקנייה</p>
                            <p class="text-2xl font-black ${profitAmount >= 0 ? 'profit' : 'loss'} font-mono leading-none tracking-tighter">
                                ${profitAmount >= 0 ? '▲' : '▼'} ₪ ${Math.abs(profitAmount).toLocaleString('he-IL', {maximumFractionDigits: 0})}
                            </p>
                            <p class="text-[11px] font-bold ${profitAmount >= 0 ? 'profit' : 'loss'} opacity-80 mt-1">
                                ${profitPercent.toFixed(2)}%
                            </p>
                        </div>
                        <div class="text-right">
                            <p class="text-[9px] text-slate-500 font-bold uppercase mb-1 tracking-widest italic">Live Price (Ag.)</p>
                            <p class="text-2xl font-black ${dailyChange >= 0 ? 'text-emerald-400' : 'text-rose-400'} font-mono leading-none tracking-tighter">
                                ${fairValue.toFixed(2)}
                            </p>
                            <p class="text-[10px] font-bold mt-1 opacity-60">היום: ${dailyChange >= 0 ? '+' : ''}${dailyChange.toFixed(2)}%</p>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });

            // עדכון המדדים הראשיים למעלה
            document.getElementById('total-value').innerText = `₪ ${totalValueSum.toLocaleString('he-IL', {maximumFractionDigits: 0})}`;
            
            const finalPnL = totalValueSum - totalInvestmentSum;
            const pnlEl = document.getElementById('total-pnl');
            pnlEl.innerText = `₪ ${finalPnL.toLocaleString('he-IL', {maximumFractionDigits: 0})}`;
            pnlEl.className = `text-3xl font-black font-mono tracking-tighter ${finalPnL >= 0 ? 'profit' : 'loss'}`;
            
            const pnlPerEl = document.getElementById('total-pnl-percent');
            const finalPer = totalInvestmentSum > 0 ? (finalPnL / totalInvestmentSum) * 100 : 0;
            pnlPerEl.innerText = `${finalPer >= 0 ? '▲' : '▼'} ${Math.abs(finalPer).toFixed(2)}% תשואה מצטברת`;
            pnlPerEl.className = `text-sm font-bold mt-1 ${finalPnL >= 0 ? 'profit' : 'loss'}`;
        }

        fetchData();
        setInterval(fetchData, 60000); // רענון אוטומטי כל דקה
    </script>
</body>
</html>
