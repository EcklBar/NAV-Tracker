<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Dashboard - Robust Version</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700;800&display=swap');
        body { font-family: 'Assistant', sans-serif; background-color: #020617; color: #f8fafc; }
        .card-grad { background: linear-gradient(145deg, rgba(30, 41, 59, 0.4) 0%, rgba(15, 23, 42, 0.6) 100%); backdrop-filter: blur(10px); }
        .profit-text { color: #10b981; }
        .loss-text { color: #f43f5e; }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        
        <div class="mb-10 grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-slate-900/60 p-6 rounded-3xl border border-slate-800 shadow-2xl">
                <p class="text-slate-500 text-[10px] font-bold uppercase mb-1">שווי תיק כולל</p>
                <div id="total-value" class="text-4xl font-black text-white font-mono">₪ 0</div>
            </div>
            
            <div class="bg-slate-900/60 p-6 rounded-3xl border border-slate-800 shadow-2xl">
                <p class="text-slate-500 text-[10px] font-bold uppercase mb-1">רווח/הפסד (P&L)</p>
                <div id="total-pnl" class="text-3xl font-black font-mono tracking-tighter text-slate-400">₪ 0</div>
                <div id="total-pnl-percent" class="text-sm font-bold mt-1 opacity-70">0.00%</div>
            </div>

            <div class="flex items-center justify-between bg-slate-900/60 p-6 rounded-3xl border border-slate-800 shadow-2xl">
                <div>
                    <div class="flex items-center gap-2">
                        <div id="led" class="w-3 h-3 bg-amber-500 rounded-full pulse"></div>
                        <span id="status" class="text-xs font-mono font-bold text-amber-400 uppercase tracking-widest">טוען...</span>
                    </div>
                </div>
                <button onclick="fetchData()" class="bg-blue-600 hover:bg-blue-500 text-white px-5 py-2.5 rounded-xl text-xs font-bold transition-all shadow-lg active:scale-95 shadow-blue-900/20">רענון</button>
            </div>
        </div>

        <div id="dashboard" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>

    </div>

    <script>
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRLE8jDhlsiNvpe6jZLmpVssN32mzA2D7UIGwjjnsTbjdpHPBUFVwloOWNRbAZSpM0b_p-AiNvJNoer/pub?gid=0&single=true&output=csv';

        function fetchData() {
            document.getElementById('status').innerText = 'מסנכרן...';
            Papa.parse(SHEET_URL, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    if (results.data) {
                        renderDashboard(results.data);
                        document.getElementById('status').innerText = 'LIVE';
                        document.getElementById('led').className = 'w-3 h-3 bg-emerald-500 rounded-full';
                    }
                }
            });
        }

        function renderDashboard(data) {
            const container = document.getElementById('dashboard');
            container.innerHTML = '';
            
            let totalValue = 0;
            let totalCost = 0;

            data.forEach(row => {
                const values = Object.values(row); // הופך את השורה למערך לפי מיקום
                
                const name = values[0]; // עמודה A
                if (!name || name.length < 2) return;

                const nav = parseFloat(values[4]) || 0;       // עמודה E
                const fairValue = parseFloat(values[11]) || 0; // עמודה L
                const quantity = parseFloat(values[13]) || 0;  // עמודה N (מיקום 13 במערך שמתחיל ב-0)
                const buyPrice = parseFloat(values[14]) || 0;  // עמודה O (מיקום 14)

                // חישובים
                const currentVal = (fairValue * quantity) / 100;
                const costVal = (buyPrice * quantity) / 100;
                
                totalValue += currentVal;
                totalCost += costVal;

                const pnl = currentVal - costVal;
                const pnlPer = buyPrice > 0 ? ((fairValue - buyPrice) / buyPrice) * 100 : 0;
                const dailyPer = nav > 0 ? ((fairValue - nav) / nav) * 100 : 0;

                const card = document.createElement('div');
                card.className = 'card-grad p-8 rounded-3xl border border-slate-800 shadow-2xl';
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-6 border-b border-slate-800/50 pb-4">
                        <div>
                            <h2 class="text-xl font-black text-white leading-tight">${name}</h2>
                            <p class="text-cyan-400 text-xs font-bold mt-1 opacity-80 italic">${values[2]}</p>
                        </div>
                        <div class="text-right">
                            <span class="text-[9px] text-blue-400 font-bold uppercase tracking-widest">שווי נוכחי</span>
                            <p class="text-2xl font-black text-white font-mono">₪ ${currentVal.toLocaleString('he-IL', {maximumFractionDigits: 0})}</p>
                        </div>
                    </div>
                    <div class="flex justify-between items-end">
                        <div>
                            <p class="text-[9px] text-slate-500 font-bold uppercase mb-1 tracking-widest leading-none">רווח/הפסד מצטבר</p>
                            <p class="text-xl font-bold ${pnl >= 0 ? 'profit-text' : 'loss-text'} font-mono">
                                ${pnl >= 0 ? '▲' : '▼'} ₪ ${Math.abs(pnl).toLocaleString('he-IL', {maximumFractionDigits: 0})}
                            </p>
                            <p class="text-xs font-bold ${pnl >= 0 ? 'profit-text' : 'loss-text'} opacity-80">
                                ${pnlPer.toFixed(2)}%
                            </p>
                        </div>
                        <div class="text-right">
                            <p class="text-[9px] text-slate-500 font-bold uppercase mb-1 tracking-widest leading-none italic">Fair Value (Daily)</p>
                            <p class="text-2xl font-black ${dailyPer >= 0 ? 'text-emerald-400' : 'text-rose-400'} font-mono">
                                ${fairValue.toFixed(2)}
                            </p>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });

            // עדכון סיכום כולל
            document.getElementById('total-value').innerText = `₪ ${totalValue.toLocaleString('he-IL', {maximumFractionDigits: 0})}`;
            const finalPnL = totalValue - totalCost;
            const pnlEl = document.getElementById('total-pnl');
            pnlEl.innerText = `₪ ${finalPnL.toLocaleString('he-IL', {maximumFractionDigits: 0})}`;
            pnlEl.className = `text-3xl font-black font-mono ${finalPnL >= 0 ? 'profit-text' : 'loss-text'}`;
            
            const pnlPerEl = document.getElementById('total-pnl-percent');
            const finalPer = totalCost > 0 ? (finalPnL / totalCost) * 100 : 0;
            pnlPerEl.innerText = `${finalPer >= 0 ? '▲' : '▼'} ${Math.abs(finalPer).toFixed(2)}% מההשקעה`;
            pnlPerEl.className = `text-sm font-bold mt-1 ${finalPnL >= 0 ? 'profit-text' : 'loss-text'}`;
        }

        fetchData();
        setInterval(fetchData, 60000);
    </script>
</body>
</html>
