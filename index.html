<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מחשבון קרנות מחקות - Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700;800&display=swap');
        body { font-family: 'Assistant', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .card-grad { background: linear-gradient(135deg, rgba(30, 41, 59, 0.7) 0%, rgba(15, 23, 42, 0.8) 100%); }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-12 border-b border-slate-800 pb-8">
            <div class="text-center md:text-right">
                <h1 class="text-4xl font-extrabold tracking-tight bg-gradient-to-r from-blue-400 to-cyan-300 bg-clip-text text-transparent">
                    דשבורד מעקב קרנות
                </h1>
                <p class="text-slate-400 mt-2 font-light">חישוב שווי הוגן בזמן אמת</p>
            </div>
            <div class="mt-6 md:mt-0 px-5 py-2 bg-slate-800/50 rounded-full border border-slate-700 flex items-center gap-3">
                <div id="led" class="w-3 h-3 bg-amber-500 rounded-full pulse"></div>
                <div id="status" class="text-xs font-mono font-bold text-amber-400 uppercase tracking-widest text-center">טוען...</div>
            </div>
        </header>

        <div id="dashboard" class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="col-span-full text-center py-20 italic text-slate-500">מעבד נתונים...</div>
        </div>

        <footer class="mt-20 pt-10 border-t border-slate-800 flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="text-slate-500 text-[10px] text-center md:text-right">
                <p>Source: <span class="text-slate-400 italic font-mono">Google Sheets API (CSV)</span></p>
                <p class="mt-1 font-bold">הנתון המוצג: אחוז השינוי הכולל מה-NAV (כולל מט"ח במידת הצורך)</p>
            </div>
            <button onclick="fetchData()" class="px-8 py-3 bg-blue-600 hover:bg-blue-500 text-white text-sm font-bold rounded-xl transition-all shadow-lg shadow-blue-900/40 active:scale-95">
                רענון נתונים
            </button>
        </footer>
    </div>

    <script>
        // הלינק המעודכן שלך
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRLE8jDhlsiNvpe6jZLmpVssN32mzA2D7UIGwjjnsTbjdpHPBUFVwloOWNRbAZSpM0b_p-AiNvJNoer/pub?gid=0&single=true&output=csv';

        function fetchData() {
            document.getElementById('status').innerText = 'מעדכן...';
            document.getElementById('led').className = 'w-3 h-3 bg-amber-500 rounded-full pulse';

            Papa.parse(SHEET_URL, {
                download: true,
                header: true,
                skipEmptyLines: true,
                transformHeader: h => h.replace(/[^\w\s\u0590-\u05FF?%()]/gi, '').trim(),
                complete: function(results) {
                    if (results.data && results.data.length > 0) {
                        renderDashboard(results.data);
                        document.getElementById('status').innerText = 'LIVE: ' + new Date().toLocaleTimeString('he-IL');
                        document.getElementById('led').className = 'w-3 h-3 bg-emerald-500 rounded-full';
                    } else {
                        showError("לא נמצאו נתונים תקינים");
                    }
                },
                error: () => showError("שגיאת תקשורת")
            });
        }

        function showError(msg) {
            document.getElementById('dashboard').innerHTML = `<div class="col-span-full text-center text-red-400 bg-red-900/10 p-10 rounded-2xl border border-red-500/20 font-bold">${msg}</div>`;
            document.getElementById('status').innerText = 'ERROR';
            document.getElementById('led').className = 'w-3 h-3 bg-red-500 rounded-full';
        }

        function renderDashboard(data) {
            const container = document.getElementById('dashboard');
            container.innerHTML = '';

            data.forEach(row => {
                const name = row['שם הקרן'] || Object.values(row)[0];
                if (!name || name.length < 2) return;

                const nav = parseFloat(row['NAV אחרון (ידני)']) || 0;
                const fairValue = parseFloat(row['מחיר תיאורטי מוערך']) || 0;
                const protection = row['הגנת מט"ח?'] || row['הגנת מטח?'] || Object.values(row)[3] || "שקלית";
                
                // חישוב אחוז השינוי האמיתי והסופי (מהשווי ההוגן ל-NAV)
                // זהו המדד המהימן ביותר שבודק את השורה התחתונה
                const totalChange = nav > 0 ? ((fairValue - nav) / nav) * 100 : 0;
                const isPos = totalChange >= 0;

                const card = document.createElement('div');
                card.className = 'card-grad p-8 rounded-3xl border border-slate-700/50 shadow-2xl hover:border-blue-500/40 transition-all duration-500';
                
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-8 font-sans">
                        <div>
                            <span class="text-[10px] font-mono text-slate-500 uppercase tracking-tighter">#${row['מספר קרן']}</span>
                            <h2 class="text-2xl font-black text-white leading-tight">${name}</h2>
                            <p class="text-cyan-400 text-sm font-semibold mt-1">${row['מדד']}</p>
                        </div>
                        <div class="bg-slate-900 px-3 py-1 rounded-md border border-slate-700 text-[9px] font-bold text-slate-400 uppercase">
                            ${protection}
                        </div>
                    </div>

                    <div class="flex justify-between items-end border-t border-slate-800 pt-6">
                        <div>
                            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mb-1 font-sans italic">NAV אחרון</p>
                            <p class="text-2xl font-bold text-slate-300 font-mono tracking-tight">${nav.toFixed(2)}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] text-blue-400 font-bold uppercase tracking-widest mb-1 italic">שווי הוגן מוערך</p>
                            <div class="text-5xl font-black ${isPos ? 'text-emerald-400' : 'text-rose-400'} tracking-tighter font-mono">
                                ${fairValue.toLocaleString('he-IL', {minimumFractionDigits: 2, maximumFractionDigits: 2})}
                            </div>
                            <div class="flex items-center justify-end gap-1 font-extrabold mt-1 ${isPos ? 'text-emerald-500' : 'text-rose-500'}">
                                <span class="text-xs">${isPos ? '▲' : '▼'}</span>
                                <span class="text-lg">${Math.abs(totalChange).toFixed(2)}%</span>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        fetchData();
        setInterval(fetchData, 60000);
    </script>
</body>
</html>
