<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Live Dashboard - Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700;800&display=swap');
        body { font-family: 'Assistant', sans-serif; background-color: #020617; color: #f8fafc; }
        .card-grad { background: linear-gradient(145deg, rgba(30, 41, 59, 0.4) 0%, rgba(15, 23, 42, 0.6) 100%); backdrop-filter: blur(10px); }
        .profit { color: #10b981; }
        .loss { color: #f43f5e; }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        
        <div id="debug-box" class="hidden mb-6 p-4 bg-red-900/20 border border-red-500/50 rounded-xl text-red-400 text-xs font-mono"></div>

        <div class="mb-10 grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-slate-900/60 p-6 rounded-3xl border border-slate-800 shadow-2xl">
                <p class="text-slate-500 text-[10px] font-bold uppercase mb-1 tracking-widest">שווי תיק כולל</p>
                <div id="total-value" class="text-4xl font-black text-white font-mono tracking-tighter text-blue-400 leading-none">₪ 0</div>
            </div>
            
            <div class="bg-slate-900/60 p-6 rounded-3xl border border-slate-800 shadow-2xl">
                <p class="text-slate-500 text-[10px] font-bold uppercase mb-1 tracking-widest">רווח/הפסד כולל</p>
                <div id="total-pnl" class="text-3xl font-black font-mono tracking-tighter">₪ 0</div>
                <div id="total-pnl-percent" class="text-sm font-bold mt-1 opacity-70">0.00%</div>
            </div>

            <div class="flex items-center justify-between bg-slate-900/60 p-6 rounded-3xl border border-slate-800 shadow-2xl">
                <div>
                    <div class="flex items-center gap-2">
                        <div id="led" class="w-3 h-3 bg-amber-500 rounded-full pulse"></div>
                        <span id="status" class="text-xs font-mono font-bold text-amber-400 uppercase">Connecting...</span>
                    </div>
                    <p id="update-time" class="text-[9px] text-slate-500 mt-2 font-mono italic"></p>
                </div>
                <button onclick="fetchData()" class="bg-blue-600 hover:bg-blue-500 text-white px-5 py-2.5 rounded-xl text-xs font-bold shadow-lg active:scale-95 shadow-blue-900/20 transition-all">רענון</button>
            </div>
        </div>

        <div id="dashboard" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 gap-8">
            <div class="col-span-full text-center py-24 text-slate-600 italic">מסתנכרן עם נתוני אמת...</div>
        </div>

    </div>

    <script>
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRLE8jDhlsiNvpe6jZLmpVssN32mzA2D7UIGwjjnsTbjdpHPBUFVwloOWNRbAZSpM0b_p-AiNvJNoer/pub?gid=0&single=true&output=csv';

        function cleanNum(val) {
            if (!val || val === "") return 0;
            const cleaned = val.toString().replace(/,/g, '').replace(/[₪%]/g, '').trim();
            return parseFloat(cleaned) || 0;
        }

        function fetchData() {
            document.getElementById('status').innerText = 'SYNCING...';
            Papa.parse(SHEET_URL, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    if (results.data && results.data.length > 0) {
                        checkColumns(results.data[0]);
                        renderDashboard(results.data);
                        document.getElementById('status').innerText = 'LIVE';
                        document.getElementById('update-time').innerText = 'LAST: ' + new Date().toLocaleTimeString();
                        document.getElementById('led').className = 'w-3 h-3 bg-emerald-500 rounded-full';
                    }
                }
            });
        }

        function checkColumns(firstRow) {
            const keys = Object.keys(firstRow).map(k => k.trim());
            const debugBox = document.getElementById('debug-box');
            
            const hasQty = keys.some(k => k.includes('כמות'));
            const hasPrice = keys.some(k => k.includes('קנייה'));

            if (!hasQty || !hasPrice) {
                debugBox.classList.remove('hidden');
                debugBox.innerHTML = `⚠️ <b>שגיאת עמודות:</b> חסרות עמודות 'כמות' או 'מחיר קנייה'.<br>עמודות שגוגל שולח כרגע: [${keys.join(', ')}]`;
            } else {
                debugBox.classList.add('hidden');
            }
        }

        function renderDashboard(data) {
            const container = document.getElementById('dashboard');
            container.innerHTML = '';
            
            let totalVal = 0;
            let totalCost = 0;

            data.forEach(row => {
                // חיפוש עמודות לפי שם גמיש
                const findVal = (sub) => {
                    const key = Object.keys(row).find(k => k.includes(sub));
                    return cleanNum(row[key]);
                };

                const name = row['שם הקרן'] || Object.values(row)[0];
                if (!name || name.length < 2) return;

                const nav = findVal('NAV');
                const fairValue = findVal('תיאורטי');
                const quantity = findVal('כמות');
                const buyPrice = findVal('קנייה');

                // חישובים בשקלים (אגורות חלקי 100)
                const currentVal = (fairValue * quantity) / 100;
                const costVal = (buyPrice * quantity) / 100;
                
                totalVal += currentVal;
                totalCost += costVal;

                const pnl = currentVal - costVal;
                const pnlPer = buyPrice > 0 ? ((fairValue - buyPrice) / buyPrice) * 100 : 0;
                const dailyPer = nav > 0 ? ((fairValue - nav) / nav) * 100 : 0;

                const card = document.createElement('div');
                card.className = 'card-grad p-8 rounded-3xl border border-slate-800 shadow-2xl hover:border-blue-500/30 transition-all duration-300';
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-6 border-b border-slate-800/50 pb-4">
                        <div>
                            <h2 class="text-xl font-black text-white leading-tight">${name}</h2>
                            <p class="text-cyan-400 text-xs font-bold mt-1 opacity-80">${row['מדד'] || ''}</p>
                        </div>
                        <div class="text-right">
                            <span class="text-[9px] text-blue-400 font-bold uppercase tracking-widest">שווי נוכחי</span>
                            <p class="text-2xl font-black text-white font-mono leading-none mt-1 italic tracking-tighter">₪ ${currentVal.toLocaleString('he-IL', {maximumFractionDigits: 0})}</p>
                        </div>
                    </div>
                    <div class="flex justify-between items-end">
                        <div>
                            <p class="text-[9px] text-slate-500 font-bold uppercase mb-1 tracking-widest">רווח/הפסד מצטבר</p>
                            <p class="text-xl font-bold ${pnl >= 0 ? 'profit' : 'loss'} font-mono leading-none">
                                ${pnl >= 0 ? '▲' : '▼'} ₪ ${Math.abs(pnl).toLocaleString('he-IL', {maximumFractionDigits: 0})}
                            </p>
                            <p class="text-[10px] font-bold ${pnl >= 0 ? 'profit' : 'loss'} opacity-70 mt-1">
                                ${pnlPer.toFixed(2)}% מהקנייה
                            </p>
                        </div>
                        <div class="text-right">
                            <p class="text-[9px] text-slate-500 font-bold uppercase mb-1 tracking-widest leading-none italic font-mono">Real-time Index</p>
                            <p class="text-2xl font-black ${dailyPer >= 0 ? 'text-emerald-400' : 'text-rose-400'} font-mono leading-none tracking-tighter">
                                ${fairValue.toFixed(2)}
                            </p>
                            <p class="text-[10px] font-bold mt-1 opacity-50">${dailyPer >= 0 ? '+' : ''}${dailyPer.toFixed(2)}% היום</p>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });

            // עדכון המדדים העליונים
            document.getElementById('total-value').innerText = `₪ ${totalVal.toLocaleString('he-IL', {maximumFractionDigits: 0})}`;
            const finalPnL = totalVal - totalCost;
            const pnlEl = document.getElementById('total-pnl');
            pnlEl.innerText = `₪ ${finalPnL.toLocaleString('he-IL', {maximumFractionDigits: 0})}`;
            pnlEl.className = `text-3xl font-black font-mono tracking-tighter ${finalPnL >= 0 ? 'profit' : 'loss'}`;
            
            const pnlPerEl = document.getElementById('total-pnl-percent');
            const finalPer = totalCost > 0 ? (finalPnL / totalCost) * 100 : 0;
            pnlPerEl.innerText = `${finalPer >= 0 ? '▲' : '▼'} ${Math.abs(finalPer).toFixed(2)}% תשואה מצטברת`;
            pnlPerEl.className = `text-sm font-bold mt-1 ${finalPnL >= 0 ? 'profit' : 'loss'}`;
        }

        fetchData();
        setInterval(fetchData, 60000);
    </script>
</body>
</html>
