<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מחשבון קרנות מחקות - Expert Version</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700;800&display=swap');
        body { font-family: 'Assistant', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .card-grad { background: linear-gradient(145deg, rgba(30, 41, 59, 0.8) 0%, rgba(15, 23, 42, 0.9) 100%); }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-12 border-b border-slate-800 pb-8">
            <div class="text-center md:text-right">
                <h1 class="text-4xl font-extrabold tracking-tight bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">
                    דשבורד מעקב קרנות
                </h1>
                <p class="text-slate-400 mt-2 font-light italic">מערכת מעקב שווי הוגן וניתוח דיוק</p>
            </div>
            <div class="mt-6 md:mt-0 px-5 py-2 bg-slate-800/50 rounded-full border border-slate-700 flex items-center gap-3 shadow-inner">
                <div id="led" class="w-3 h-3 bg-amber-500 rounded-full pulse"></div>
                <div id="status" class="text-[10px] font-mono font-bold text-amber-400 uppercase tracking-widest">טוען נתונים...</div>
            </div>
        </header>

        <div id="dashboard" class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="col-span-full text-center py-20 italic text-slate-500 animate-pulse text-lg">
                מתחבר ל-Google Sheets...
            </div>
        </div>

        <footer class="mt-20 pt-10 border-t border-slate-800 flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="text-slate-500 text-[10px] text-center md:text-right space-y-1">
                <p>מקור: <span class="text-slate-400 italic">Google Sheets CSV API</span></p>
                <p class="font-bold text-slate-400">כפתור הרענון מושך את הגרסה האחרונה שפורסמה בגיליון.</p>
            </div>
            <button onclick="fetchData()" class="group relative px-8 py-3 bg-blue-600 hover:bg-blue-500 text-white text-sm font-bold rounded-xl transition-all shadow-lg shadow-blue-900/40 active:scale-95">
                <span class="relative z-10">רענון נתונים</span>
                <div class="absolute inset-0 bg-blue-400 blur-lg opacity-0 group-hover:opacity-20 transition-opacity"></div>
            </button>
        </footer>
    </div>

    <script>
        // הלינק המדויק שלך
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRLE8jDhlsiNvpe6jZLmpVssN32mzA2D7UIGwjjnsTbjdpHPBUFVwloOWNRbAZSpM0b_p-AiNvJNoer/pub?gid=0&single=true&output=csv';

        function fetchData() {
            document.getElementById('status').innerText = 'מבצע Fetch...';
            document.getElementById('led').className = 'w-3 h-3 bg-amber-500 rounded-full pulse';

            Papa.parse(SHEET_URL, {
                download: true,
                header: true,
                skipEmptyLines: true,
                transformHeader: h => h.replace(/[^\w\s\u0590-\u05FF?%()]/gi, '').trim(),
                complete: function(results) {
                    if (results.data && results.data.length > 0) {
                        renderDashboard(results.data);
                        document.getElementById('status').innerText = 'מחובר: ' + new Date().toLocaleTimeString('he-IL');
                        document.getElementById('led').className = 'w-3 h-3 bg-emerald-500 rounded-full';
                    } else {
                        showError("הגיליון ריק או לא נגיש");
                    }
                },
                error: () => showError("שגיאת חיבור (CORS או URL שגוי)")
            });
        }

        function showError(msg) {
            document.getElementById('dashboard').innerHTML = `<div class="col-span-full bg-red-900/10 border border-red-500/20 p-10 rounded-2xl text-center text-red-400 font-bold">${msg}</div>`;
            document.getElementById('status').innerText = 'ERROR';
            document.getElementById('led').className = 'w-3 h-3 bg-red-500 rounded-full';
        }

        function renderDashboard(data) {
            const container = document.getElementById('dashboard');
            container.innerHTML = '';

            data.forEach(row => {
                const name = row['שם הקרן'] || Object.values(row)[0];
                if (!name || name.length < 2) return;

                const nav = parseFloat(row['NAV אחרון (ידני)']) || 0;
                const fairValue = parseFloat(row['מחיר תיאורטי מוערך']) || 0;
                const protection = row['הגנת מט"ח?'] || row['הגנת מטח?'] || Object.values(row)[3] || "שקלית";
                
                // חישוב אחוז השינוי האמיתי והסופי (השווי ההוגן מול ה-NAV)
                const totalChange = nav > 0 ? ((fairValue - nav) / nav) * 100 : 0;
                const isPos = totalChange >= 0;

                // חילוץ ציון דיוק (אם קיים בעמודה בשיטס)
                const accuracy = row['סטייה היסטורית'] || "";

                const card = document.createElement('div');
                card.className = 'card-grad p-8 rounded-3xl border border-slate-700/50 shadow-2xl hover:border-blue-500/40 transition-all duration-500';
                
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-8">
                        <div>
                            <span class="text-[9px] font-mono text-slate-500 uppercase tracking-tighter">ID: ${row['מספר קרן']}</span>
                            <h2 class="text-2xl font-black text-white leading-tight">${name}</h2>
                            <p class="text-cyan-400 text-xs font-bold mt-1 uppercase tracking-wide">${row['מדד']}</p>
                        </div>
                        <div class="flex flex-col items-end gap-2">
                            <span class="bg-slate-900 px-3 py-1 rounded-md border border-slate-700 text-[9px] font-bold text-slate-400 uppercase">
                                ${protection}
                            </span>
                            ${accuracy ? `<span class="text-[9px] text-emerald-400 font-bold tracking-widest bg-emerald-950/30 px-2 py-0.5 rounded border border-emerald-900/50 italic">ACCURACY: ${accuracy}</span>` : ''}
                        </div>
                    </div>

                    <div class="flex justify-between items-end border-t border-slate-800 pt-6">
                        <div>
                            <p class="text-[10px] text-slate-500 font-bold uppercase mb-1 italic">NAV אחרון (Base)</p>
                            <p class="text-2xl font-bold text-slate-300 font-mono tracking-tight">${nav.toFixed(2)}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] text-blue-400 font-bold uppercase mb-1 italic">Fair Value (Live)</p>
                            <div class="text-5xl font-black ${isPos ? 'text-emerald-400' : 'text-rose-400'} tracking-tighter font-mono leading-none">
                                ${fairValue.toLocaleString('he-IL', {minimumFractionDigits: 2, maximumFractionDigits: 2})}
                            </div>
                            <div class="flex items-center justify-end gap-1 font-extrabold mt-3 ${isPos ? 'text-emerald-500' : 'text-rose-500'}">
                                <span class="text-xs">${isPos ? '▲' : '▼'}</span>
                                <span class="text-xl tracking-tight">${Math.abs(totalChange).toFixed(2)}%</span>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // טעינה ראשונית
        fetchData();
        // רענון אוטומטי כל 60 שניות
        setInterval(fetchData, 60000);
    </script>
</body>
</html>
